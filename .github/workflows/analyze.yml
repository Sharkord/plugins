name: analyze

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'plugins/**/versions/*.json'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head
        run: git fetch origin "${{ github.event.pull_request.head.sha }}"

      - name: Detect new version files
        id: detect
        run: |
          added_files=$(git diff --name-only --diff-filter=A "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- 'plugins/*/versions/*.json')
          {
            echo 'files<<EOF'
            echo "$added_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Skip when no new version files were added
        if: steps.detect.outputs.files == ''
        run: echo 'No new version files added in this pull request.'

      - name: Checkout PR version files only
        if: steps.detect.outputs.files != ''
        run: |
          while IFS= read -r file; do
            file=$(echo "$file" | xargs)
            if [ -n "$file" ]; then
              git checkout "${{ github.event.pull_request.head.sha }}" -- "$file"
            fi
          done <<'EOF'
          ${{ steps.detect.outputs.files }}
          EOF

      - name: Setup Bun
        if: steps.detect.outputs.files != ''
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        if: steps.detect.outputs.files != ''
        run: bun install

      - name: Analyze new plugin versions
        if: steps.detect.outputs.files != ''
        env:
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          while IFS= read -r file; do
            file=$(echo "$file" | xargs)
            if [ -n "$file" ]; then
              bun run analyze -- "$file"
            fi
          done <<'EOF'
          ${{ steps.detect.outputs.files }}
          EOF
